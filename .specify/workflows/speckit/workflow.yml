schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Constitution-Governed SDD Cycle"
  version: "2.1.0"
  author: "GitHub"
  description: "Requires an approved constitution, then runs specify → clarify → plan → checklist → tasks → analyze → implement with review gates"

requires:
  speckit_version: ">=0.8.5"
  integrations:
    # These project commands are required by the constitution. The list is an advisory,
    # non-exhaustive compatibility hint; the active integration must provide every command used
    # below.
    any:
      - "codex"
      - "claude"
      - "copilot"
      - "gemini"
      - "opencode"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe one bounded, independently valuable stakeholder outcome"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use; 'auto' uses the project's initialized integration"
  scope:
    type: string
    default: "full"
    enum: ["full", "backend-only", "frontend-only"]

steps:
  - id: constitution-approved
    type: gate
    message: "Confirm .specify/memory/constitution.md is approved on main before feature work."
    options: [approve, reject]
    on_reject: abort

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-initial-spec
    type: gate
    message: "Review the bounded outcome, exclusions, source evidence, and Pending Functional Validation entries before clarification."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "Resolve material ambiguity without inferring unknown legacy or fiscal behavior."

  - id: review-clarified-spec
    type: gate
    message: "Approve the clarified target requirements before technical planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Approve both constitution checks, source evidence, the definitive Company-header and no-Company-dependency boundary, failure design, and complexity justifications."
    options: [approve, reject]
    on_reject: abort

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "Create a formal reviewer gate for requirement quality, emphasizing fiscal correctness, Company-header and ownership scoping, absence of authentication and Company lookup dependencies, idempotency, external contracts, certificate management, and database evolution."

  - id: review-checklist
    type: gate
    message: "Confirm checklist findings were evaluated honestly and material requirement gaps were resolved."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "Generate all applicable risk-based test and implementation tasks required by the constitution."

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "Treat every constitution conflict, including authentication, Company lookup, Company master-data ownership, or draft-time snapshot violations, as critical and identify requirement-to-task coverage gaps."

  - id: review-analysis
    type: gate
    message: "Reject implementation while any critical fiscal, Company-context, Company-master-data boundary, data-loss, idempotency, external-contract, certificate, or database-evolution finding remains unresolved."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"
