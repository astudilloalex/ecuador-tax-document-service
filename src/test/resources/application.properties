# Ephemeral PostgreSQL Dev Services baseline. Credentials and ports remain generated by Quarkus.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=docker.io/library/postgres:18.4
quarkus.datasource.devservices.reuse=false
quarkus.datasource.devservices.show-logs=false

# Flyway is the sole test-schema owner; Hibernate may validate but never create or update schema.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.validate-at-start=true
quarkus.flyway.clean-at-start=false
quarkus.flyway.clean-disabled=false
quarkus.hibernate-orm.schema-management.strategy=validate

# Keep migration and reactive database resources bounded in the test profile.
quarkus.datasource.jdbc.login-timeout=PT5S
quarkus.datasource.jdbc.acquisition-timeout=PT5S
quarkus.datasource.jdbc.validation-query-timeout=PT2S
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.reconnect-attempts=0
quarkus.datasource.reactive.idle-timeout=PT30S
quarkus.datasource.reactive.max-lifetime=PT2M
quarkus.datasource.reactive.additional-properties.statement_timeout=5000

# The test profile targets the bounded local contract fixture and the existing PostgreSQL Dev
# Service only. It contains no production destination or credentials.
quarkus.rest-client.authoritative-fiscal-context.url=http://127.0.0.1:18082
quarkus.rest-client.authoritative-fiscal-context.connect-timeout=1000
quarkus.rest-client.authoritative-fiscal-context.read-timeout=2000
fiscal-preparation.request-deadline=PT10S
fiscal-preparation.persistence.operation-timeout=PT4S
fiscal-preparation.persistence.write-transaction-timeout=PT5S
fiscal-preparation.persistence.lock-timeout=PT3S
fiscal-preparation.authoritative-context.retry-attempts=0
fiscal-preparation.telemetry.persist-provider-payloads=false
fiscal-preparation.telemetry.include-sensitive-labels=false

# Generate test metrics and trace context without sending telemetry to an external destination.
quarkus.micrometer.enabled=true
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.enabled=false

# Use a random available port to avoid conflicts with any running dev server.
quarkus.http.test-port=0
