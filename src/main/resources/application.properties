# PostgreSQL is the only application datastore. Both the blocking Flyway datasource and the
# reactive application datasource target the same configured database.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc=true
quarkus.datasource.reactive=true
quarkus.datasource.health.enabled=true
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/sri_db}
quarkus.datasource.reactive.url=${DB_REACTIVE_URL:postgresql://localhost:5432/sri_db}
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:admin}

# Flyway exclusively owns schema evolution; Hibernate may only validate the migrated schema.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.validate-at-start=true
# Quarkus validates before it migrates; pending versioned migrations remain eligible for startup
# application while every other validation state remains enforced.
quarkus.flyway.ignore-migration-patterns=*:pending
quarkus.flyway.clean-at-start=false
quarkus.flyway.clean-disabled=true
quarkus.hibernate-orm.schema-management.strategy=validate

# Bound every database resource independently from the end-to-end request deadline.
quarkus.datasource.jdbc.login-timeout=PT5S
quarkus.datasource.jdbc.acquisition-timeout=PT5S
quarkus.datasource.jdbc.validation-query-timeout=PT2S
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.reconnect-attempts=0
quarkus.datasource.reactive.idle-timeout=PT30S
quarkus.datasource.reactive.max-lifetime=PT5M
quarkus.datasource.reactive.additional-properties.statement_timeout=5000
invoice-draft.persistence.operation-timeout=PT5S
invoice-draft.persistence.write-transaction-timeout=PT5S
invoice-draft.request-deadline=PT10S

# Enforce the approved transport and serialization contract at the service boundary.
quarkus.http.limits.max-body-size=2097152
quarkus.jackson.fail-on-unknown-properties=true
quarkus.rest.exception-mapping.disable-mapper-for=io.quarkus.resteasy.reactive.jackson.runtime.mappers.BuiltinMismatchedInputExceptionMapper
mp.openapi.scan.disable=true
