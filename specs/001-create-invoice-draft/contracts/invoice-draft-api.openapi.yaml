openapi: 3.1.0
info:
  title: Ecuador Tax Document Service - Invoice Draft API
  version: 1.0.0
  description: >-
    Internal target API for creating and immediately reviewing an Invoice Draft. It performs no
    Company lookup, authentication, authorization, fiscal issuance, or SRI operation.
servers:
  - url: /api/v1
tags:
  - name: Invoice Drafts

paths:
  /invoice-drafts:
    post:
      tags: [Invoice Drafts]
      operationId: createInvoiceDraft
      summary: Create and return a complete Invoice Draft
      description: >-
        Accepts Company ownership context only through X-Company-Id. CompanyId is not a path,
        query, or body field. The request contains client-controlled commercial inputs only;
        Company, Issuer, fiscal-snapshot, and system-calculated properties are prohibited. The
        service captures one requestCreationInstant at the request boundary and derives the
        expected emission date from that instant in America/Guayaquil; that expected date remains
        fixed even when validation or commit crosses midnight. The upstream billing workflow
        selects the published IVA rule appropriate to the product or transaction; this service
        does not classify products or determine legal eligibility. Observable processing precedence
        is payload size, Company context, correlation, idempotency-key syntax, representation,
        normalization, local Company-scoped binding lookup, equivalent replay, idempotency
        conflict, business validation, calculation, and atomic persistence.
        One monotonic 10-second request deadline arbitrates before and during every stage: a stage
        outcome conclusively determined before expiry wins; otherwise REQUEST_TIMEOUT wins, and a
        later signal cannot replace the selected result. An unresolved commit is reconciled by
        retrying the same CompanyId, idempotency key, and equivalent content.
      parameters:
        - $ref: '#/components/parameters/CompanyContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceDraftRequest'
      responses:
        '201':
          description: A new Invoice Draft and idempotency binding were committed.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
            Idempotency-Replayed:
              $ref: '#/components/headers/NewResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDraftResponse'
        '200':
          description: >-
            An equivalent request returned the original committed Invoice Draft without
            revalidating its emission date against the current Ecuadorian date.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
            Idempotency-Replayed:
              $ref: '#/components/headers/ReplayedResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDraftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/ValidationFailure'
        '500':
          $ref: '#/components/responses/InternalFailure'
        '503':
          $ref: '#/components/responses/PersistenceUnavailable'
        '504':
          $ref: '#/components/responses/RequestTimeout'

components:
  parameters:
    CompanyContext:
      name: X-Company-Id
      in: header
      required: true
      description: >-
        Exactly one value is accepted. Surrounding whitespace is trimmed; the result must be a
        syntactically valid non-nil UUID. The service normalizes it to canonical lowercase
        hyphenated form. The value identifies the Invoice Draft ownership and idempotency
        partition. It is business context, not an authentication or authorization credential.
      schema:
        type: string
        format: uuid
        pattern: '^(?!00000000-0000-0000-0000-000000000000$)[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Caller-generated key trimmed before use and scoped by canonical CompanyId. It remains bound
        for the lifetime of the created draft.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x20-\x7E]+$'
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >-
        Optional caller correlation identifier. When supplied, exactly one value is accepted and
        surrounding whitespace is trimmed. A valid value contains 1 to 64 characters, begins with
        an ASCII letter or digit, and contains only ASCII letters, digits, period, underscore,
        colon, or hyphen. A valid supplied value is preserved and returned. When absent, the
        service generates and returns a safe UUID. A blank, repeated, over-length, or otherwise
        unsafe supplied value is never echoed: the service generates a replacement UUID and
        returns INVALID_REQUEST when correlation validation is the governing failure. If payload
        size is already conclusively over limit, classification only chooses the safe correlation
        returned with REQUEST_PAYLOAD_TOO_LARGE; invalid input does not replace 413 with 400.
      schema:
        $ref: '#/components/schemas/CorrelationIdentifier'

  headers:
    CorrelationId:
      description: Correlates this attempt and its safe operational evidence.
      required: true
      schema:
        $ref: '#/components/schemas/CorrelationIdentifier'
    NewResult:
      description: Indicates that this response represents a new committed draft.
      required: true
      schema:
        type: boolean
        const: false
    ReplayedResult:
      description: Indicates that this response represents an equivalent replay.
      required: true
      schema:
        type: boolean
        const: true

  schemas:
    CorrelationIdentifier:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$'

    CreateInvoiceDraftRequest:
      type: object
      additionalProperties: false
      required:
        - emissionPointId
        - emissionDate
        - buyer
        - lines
        - payments
      properties:
        emissionPointId:
          type: string
          format: uuid
          description: >-
            Required non-nil UUID stored as an opaque external reference. This service does not
            validate Company ownership, active state, Issuer, or establishment relationships.
          pattern: '^(?!00000000-0000-0000-0000-000000000000$)[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$'
        emissionDate:
          type: string
          format: date
          description: >-
            Must equal the Ecuadorian civil date derived in America/Guayaquil from the single
            requestCreationInstant captured at the request boundary. That expected date is fixed
            across midnight and commit; requestCreationInstant is not a request property.
        buyer:
          $ref: '#/components/schemas/BuyerInput'
        lines:
          type: array
          minItems: 1
          maxItems: 500
          description: Order is business-significant and preserved.
          items:
            $ref: '#/components/schemas/InvoiceLineInput'
        payments:
          type: array
          minItems: 1
          maxItems: 8
          description: >-
            Order is representation-only; payment-method identity must be unique within the draft.
          items:
            $ref: '#/components/schemas/PaymentInput'
        additionalInformation:
          type: array
          maxItems: 15
          default: []
          description: Order is representation-only; canonical names must be unique.
          items:
            $ref: '#/components/schemas/AdditionalInformationInput'

    BuyerInput:
      type: object
      additionalProperties: false
      required: [identificationType, identification, legalName]
      properties:
        identificationType:
          type: string
          enum: ['04', '05', '06', '07', '08']
          description: Official SRI buyer-identification code from SRI-OFFLINE-2.32-TARGET-1.
        identification:
          type: string
          minLength: 1
          maxLength: 20
          description: >-
            Validated by the selected approved baseline strategy: 04 is exactly 13 ASCII digits,
            05 is exactly 10 ASCII digits, 06 and 08 are 1–20 alphanumeric characters, and 07 is
            exactly 9999999999999. This feature applies no RUC or identity-card checksum.
        legalName:
          type: string
          minLength: 1
          maxLength: 300
        address:
          type: string
          minLength: 1
          maxLength: 300
        email:
          type: string
          format: email
          maxLength: 254
        telephone:
          type: string
          minLength: 7
          maxLength: 20
          pattern: '^(?=(?:\D*\d){7,15}\D*$)[0-9+() -]+$'

    InvoiceLineInput:
      type: object
      additionalProperties: false
      required: [productCode, description, quantity, unitPrice, discount, taxRuleId]
      properties:
        productCode:
          type: string
          minLength: 1
          maxLength: 25
          pattern: '^[A-Za-z0-9]+$'
        description:
          type: string
          minLength: 1
          maxLength: 300
        quantity:
          $ref: '#/components/schemas/PositiveSixScaleDecimal'
        unitPrice:
          $ref: '#/components/schemas/NonNegativeSixScaleDecimal'
        discount:
          $ref: '#/components/schemas/MoneyDecimal'
        taxRuleId:
          type: string
          format: uuid
          description: >-
            Selects exactly one active, emission-date-effective IVA rule published by
            SRI-OFFLINE-2.32-TARGET-1. The caller owns product/transaction classification.
          examples:
            - 84cb3f03-574b-54de-9e73-efb8d485476a
            - 5b34b038-931c-50e3-a84c-10af272fdcd4

    PaymentInput:
      type: object
      additionalProperties: false
      required: [paymentMethodId, amount]
      properties:
        paymentMethodId:
          type: string
          format: uuid
          description: Stable payment-method UUID published by SRI-OFFLINE-2.32-TARGET-1.
          example: 639f2b7e-10a3-5d92-a1a3-28223896f5b5
        amount:
          $ref: '#/components/schemas/MoneyDecimal'

    AdditionalInformationInput:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        value:
          type: string
          minLength: 1
          maxLength: 300

    InvoiceDraftResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - companyId
        - emissionPointId
        - emissionDate
        - status
        - currency
        - buyer
        - lines
        - taxTotals
        - payments
        - additionalInformation
        - subtotalBeforeTaxes
        - totalDiscount
        - grandTotal
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Local Invoice Draft identifier; not a fiscal identifier.
        companyId:
          type: string
          format: uuid
          pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          description: Canonical normalized immutable Company ownership reference.
        emissionPointId:
          type: string
          format: uuid
          description: Canonical opaque external reference captured in the draft.
        emissionDate:
          type: string
          format: date
        status:
          type: string
          const: DRAFT
        currency:
          type: string
          const: USD
        buyer:
          $ref: '#/components/schemas/BuyerResult'
        lines:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/InvoiceLineResult'
        taxTotals:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaxTotalResult'
        payments:
          type: array
          minItems: 1
          maxItems: 8
          items:
            $ref: '#/components/schemas/PaymentResult'
        additionalInformation:
          type: array
          maxItems: 15
          items:
            $ref: '#/components/schemas/AdditionalInformationInput'
        subtotalBeforeTaxes:
          $ref: '#/components/schemas/MoneyDecimal'
        totalDiscount:
          $ref: '#/components/schemas/MoneyDecimal'
        grandTotal:
          $ref: '#/components/schemas/MoneyDecimal'
        createdAt:
          type: string
          format: date-time
          description: >-
            Confirmed commit instant. It does not determine the accepted emission date.
        updatedAt:
          type: string
          format: date-time

    BuyerResult:
      allOf:
        - $ref: '#/components/schemas/BuyerInput'

    InvoiceLineResult:
      type: object
      additionalProperties: false
      required:
        - position
        - productCode
        - description
        - quantity
        - unitPrice
        - discount
        - grossAmount
        - netAmount
        - tax
        - lineTotal
      properties:
        position:
          type: integer
          minimum: 1
          maximum: 500
        productCode:
          type: string
          maxLength: 25
        description:
          type: string
          maxLength: 300
        quantity:
          $ref: '#/components/schemas/PositiveSixScaleDecimal'
        unitPrice:
          $ref: '#/components/schemas/NonNegativeSixScaleDecimal'
        discount:
          $ref: '#/components/schemas/MoneyDecimal'
        grossAmount:
          $ref: '#/components/schemas/MoneyDecimal'
        netAmount:
          $ref: '#/components/schemas/MoneyDecimal'
        tax:
          $ref: '#/components/schemas/LineTaxResult'
        lineTotal:
          $ref: '#/components/schemas/MoneyDecimal'

    LineTaxResult:
      type: object
      additionalProperties: false
      required:
        - taxRuleId
        - family
        - treatment
        - officialTaxCode
        - officialPercentageCode
        - rate
        - base
        - amount
        - catalogVersion
      properties:
        taxRuleId:
          type: string
          format: uuid
        family:
          type: string
          const: IVA
        treatment:
          $ref: '#/components/schemas/TaxTreatment'
        officialTaxCode:
          type: string
          maxLength: 8
        officialPercentageCode:
          type: string
          maxLength: 8
        rate:
          $ref: '#/components/schemas/PercentageDecimal'
        base:
          $ref: '#/components/schemas/MoneyDecimal'
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    TaxTotalResult:
      type: object
      additionalProperties: false
      required:
        - family
        - treatment
        - officialTaxCode
        - officialPercentageCode
        - rate
        - base
        - amount
        - catalogVersion
      properties:
        family:
          type: string
          const: IVA
        treatment:
          $ref: '#/components/schemas/TaxTreatment'
        officialTaxCode:
          type: string
          maxLength: 8
        officialPercentageCode:
          type: string
          maxLength: 8
        rate:
          $ref: '#/components/schemas/PercentageDecimal'
        base:
          $ref: '#/components/schemas/MoneyDecimal'
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    PaymentResult:
      type: object
      additionalProperties: false
      required: [paymentMethodId, officialCode, name, amount, catalogVersion]
      properties:
        paymentMethodId:
          type: string
          format: uuid
        officialCode:
          type: string
          maxLength: 8
        name:
          type: string
          maxLength: 100
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    TaxTreatment:
      type: string
      enum: [PERCENTAGE_RATE, ZERO_RATE, NOT_SUBJECT, EXEMPT]

    PositiveSixScaleDecimal:
      type: string
      minLength: 1
      maxLength: 13
      pattern: '^(?=.*[1-9])(?:0|[1-9][0-9]{0,5})(?:\.[0-9]{1,6})?$'
      description: >-
        Exact positive decimal from 0.000001 through 999999.999999 with at most six fractional
        digits. A syntactically numeric value outside this envelope produces
        BUSINESS_VALIDATION_FAILED with violation MONETARY_RANGE_EXCEEDED.
      examples: ['0.000001', '2', '999999.999999']

    NonNegativeSixScaleDecimal:
      type: string
      minLength: 1
      maxLength: 13
      pattern: '^(?:0|[1-9][0-9]{0,5})(?:\.[0-9]{1,6})?$'
      description: >-
        Exact decimal from 0 through 999999.999999 with at most six fractional digits. A
        syntactically numeric value outside this envelope produces BUSINESS_VALIDATION_FAILED with
        violation MONETARY_RANGE_EXCEEDED.
      examples: ['0', '10.000000', '999999.999999']

    MoneyDecimal:
      type: string
      minLength: 4
      maxLength: 18
      pattern: '^(?:0|[1-9][0-9]{0,14})\.[0-9]{2}$'
      description: >-
        Exact non-negative USD amount from 0.00 through 999999999999999.99 with exactly two
        fractional digits. A syntactically numeric value outside this envelope produces
        BUSINESS_VALIDATION_FAILED with violation MONETARY_RANGE_EXCEEDED.
      examples: ['0.00', '17.25', '999999999999999.99']

    PercentageDecimal:
      type: string
      minLength: 4
      maxLength: 6
      pattern: '^(?:(?:0|[1-9][0-9]?)\.[0-9]{2}|100\.00)$'
      description: >-
        Exact percentage from 0.00 through 100.00 with exactly two fractional digits. An
        out-of-envelope catalog rate produces BUSINESS_VALIDATION_FAILED with violation
        MONETARY_RANGE_EXCEEDED.
      examples: ['0.00', '15.00', '100.00']

    ErrorCode:
      type: string
      enum:
        - COMPANY_CONTEXT_REQUIRED
        - COMPANY_CONTEXT_INVALID
        - INVALID_REQUEST
        - PROHIBITED_CALCULATED_FIELD
        - IDEMPOTENCY_CONFLICT
        - REQUEST_PAYLOAD_TOO_LARGE
        - BUSINESS_VALIDATION_FAILED
        - PERSISTENCE_UNAVAILABLE
        - REQUEST_TIMEOUT
        - INTERNAL_ERROR

    ProblemDetails:
      type: object
      additionalProperties: false
      required: [type, title, status, code, detail, instance, correlationId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          $ref: '#/components/schemas/ErrorCode'
        detail:
          type: string
          description: Safe English detail without rejected values or implementation internals.
        instance:
          type: string
          format: uri
        correlationId:
          $ref: '#/components/schemas/CorrelationIdentifier'
        violations:
          type: array
          description: >-
            Safe validation details. BUSINESS_VALIDATION_FAILED uses MONETARY_RANGE_EXCEEDED for
            quantity, unit-price, monetary, intermediate, aggregate, payment-sum, or rate overflow.
          items:
            $ref: '#/components/schemas/Violation'

    Violation:
      type: object
      additionalProperties: false
      required: [code, field]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
        field:
          type: string
          description: Safe request field path; never contains the rejected value.

  responses:
    BadRequest:
      description: >-
        COMPANY_CONTEXT_REQUIRED, COMPANY_CONTEXT_INVALID, or INVALID_REQUEST. Invalid supplied
        correlation input is never echoed; a safe replacement UUID is returned. Payload-size and
        Company-context failures take precedence over correlation invalidity. No draft, child, or
        idempotency binding is created.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    IdempotencyConflict:
      description: IDEMPOTENCY_CONFLICT; the scoped key is bound to different content.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PayloadTooLarge:
      description: >-
        REQUEST_PAYLOAD_TOO_LARGE; body is conclusively observed to exceed 2,097,152 bytes before
        deadline expiry. One valid correlation value is preserved; absent or invalid input receives
        a safe generated replacement and never changes 413 to 400. No later processing or database
        operation occurs.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationFailure:
      description: >-
        PROHIBITED_CALCULATED_FIELD or BUSINESS_VALIDATION_FAILED. Numeric-envelope breaches use
        BUSINESS_VALIDATION_FAILED with violation MONETARY_RANGE_EXCEEDED.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PersistenceUnavailable:
      description: PERSISTENCE_UNAVAILABLE; retry with the same Company, key, and content.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
        Retry-After:
          description: Optional safe retry delay when known.
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    RequestTimeout:
      description: >-
        REQUEST_TIMEOUT; the cross-cutting request deadline expired before the current stage or
        persistence outcome became conclusive. Retry with the same Company, key, and content;
        unresolved commit state makes no zero-state guarantee and is reconciled by that replay.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalFailure:
      description: INTERNAL_ERROR; safe unexpected failure.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
