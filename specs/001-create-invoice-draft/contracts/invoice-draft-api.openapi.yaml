openapi: 3.1.0
info:
  title: Ecuador Tax Document Service - Invoice Draft API
  version: 1.0.0
  description: >-
    Internal target API for creating and immediately reviewing an Invoice Draft. It performs no
    Company lookup, authentication, authorization, fiscal issuance, or SRI operation.
servers:
  - url: /api/v1
tags:
  - name: Invoice Drafts

paths:
  /invoice-drafts:
    post:
      tags: [Invoice Drafts]
      operationId: createInvoiceDraft
      summary: Create and return a complete Invoice Draft
      description: >-
        Accepts Company ownership context only through X-Company-Id. CompanyId is not a path,
        query, or body field. The request contains client-controlled commercial inputs only;
        Company, Issuer, fiscal-snapshot, and system-calculated properties are prohibited.
      parameters:
        - $ref: '#/components/parameters/CompanyContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceDraftRequest'
      responses:
        '201':
          description: A new Invoice Draft and idempotency binding were committed.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
            Idempotency-Replayed:
              $ref: '#/components/headers/NewResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDraftResponse'
        '200':
          description: An equivalent request returned the original committed Invoice Draft.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
            Idempotency-Replayed:
              $ref: '#/components/headers/ReplayedResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDraftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/ValidationFailure'
        '500':
          $ref: '#/components/responses/InternalFailure'
        '503':
          $ref: '#/components/responses/PersistenceUnavailable'
        '504':
          $ref: '#/components/responses/RequestTimeout'

components:
  parameters:
    CompanyContext:
      name: X-Company-Id
      in: header
      required: true
      description: >-
        Exactly one value is accepted. Surrounding whitespace is trimmed; the result must be a
        syntactically valid non-nil UUID. The service normalizes it to canonical lowercase
        hyphenated form. The value identifies the Invoice Draft ownership and idempotency
        partition. It is business context, not an authentication or authorization credential.
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Caller-generated key trimmed before use and scoped by canonical CompanyId. It remains bound
        for the lifetime of the created draft.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x20-\x7E]+$'
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >-
        Optional caller correlation identifier. A valid supplied value is preserved and returned;
        a UUID is generated and returned when absent.
      schema:
        $ref: '#/components/schemas/CorrelationIdentifier'

  headers:
    CorrelationId:
      description: Correlates this attempt and its safe operational evidence.
      required: true
      schema:
        $ref: '#/components/schemas/CorrelationIdentifier'
    NewResult:
      description: Indicates that this response represents a new committed draft.
      required: true
      schema:
        type: boolean
        const: false
    ReplayedResult:
      description: Indicates that this response represents an equivalent replay.
      required: true
      schema:
        type: boolean
        const: true

  schemas:
    CorrelationIdentifier:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$'

    CreateInvoiceDraftRequest:
      type: object
      additionalProperties: false
      required:
        - emissionPointId
        - emissionDate
        - buyer
        - lines
        - payments
      properties:
        emissionPointId:
          type: string
          format: uuid
          description: >-
            Required non-nil UUID stored as an opaque external reference. This service does not
            validate Company ownership, active state, Issuer, or establishment relationships.
          pattern: '^(?!00000000-0000-0000-0000-000000000000$)[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$'
        emissionDate:
          type: string
          format: date
          description: Must equal the Ecuadorian civil date at original creation.
        buyer:
          $ref: '#/components/schemas/BuyerInput'
        lines:
          type: array
          minItems: 1
          maxItems: 500
          description: Order is business-significant and preserved.
          items:
            $ref: '#/components/schemas/InvoiceLineInput'
        payments:
          type: array
          minItems: 1
          maxItems: 10
          description: >-
            Order is representation-only; payment-method identity must be unique within the draft.
          items:
            $ref: '#/components/schemas/PaymentInput'
        additionalInformation:
          type: array
          maxItems: 15
          default: []
          description: Order is representation-only; canonical names must be unique.
          items:
            $ref: '#/components/schemas/AdditionalInformationInput'

    BuyerInput:
      type: object
      additionalProperties: false
      required: [identificationType, identification, legalName]
      properties:
        identificationType:
          type: string
          enum: ['04', '05', '06', '07', '08']
        identification:
          type: string
          minLength: 1
          maxLength: 20
        legalName:
          type: string
          minLength: 1
          maxLength: 300
        address:
          type: string
          minLength: 1
          maxLength: 300
        email:
          type: string
          format: email
          maxLength: 254
        telephone:
          type: string
          minLength: 7
          maxLength: 20
          pattern: '^(?=(?:\D*\d){7,15}\D*$)[0-9+() -]+$'

    InvoiceLineInput:
      type: object
      additionalProperties: false
      required: [productCode, description, quantity, unitPrice, discount, taxRuleId]
      properties:
        productCode:
          type: string
          minLength: 1
          maxLength: 25
          pattern: '^[A-Za-z0-9]+$'
        description:
          type: string
          minLength: 1
          maxLength: 300
        quantity:
          $ref: '#/components/schemas/PositiveSixScaleDecimal'
        unitPrice:
          $ref: '#/components/schemas/NonNegativeSixScaleDecimal'
        discount:
          $ref: '#/components/schemas/MoneyDecimal'
        taxRuleId:
          type: string
          format: uuid
          description: Selects exactly one active, emission-date-effective IVA rule.

    PaymentInput:
      type: object
      additionalProperties: false
      required: [paymentMethodId, amount]
      properties:
        paymentMethodId:
          type: string
          format: uuid
        amount:
          $ref: '#/components/schemas/MoneyDecimal'

    AdditionalInformationInput:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        value:
          type: string
          minLength: 1
          maxLength: 300

    InvoiceDraftResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - companyId
        - emissionPointId
        - emissionDate
        - status
        - currency
        - buyer
        - lines
        - taxTotals
        - payments
        - additionalInformation
        - subtotalBeforeTaxes
        - totalDiscount
        - grandTotal
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Local Invoice Draft identifier; not a fiscal identifier.
        companyId:
          type: string
          format: uuid
          pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          description: Canonical normalized immutable Company ownership reference.
        emissionPointId:
          type: string
          format: uuid
          description: Canonical opaque external reference captured in the draft.
        emissionDate:
          type: string
          format: date
        status:
          type: string
          const: DRAFT
        currency:
          type: string
          const: USD
        buyer:
          $ref: '#/components/schemas/BuyerResult'
        lines:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/InvoiceLineResult'
        taxTotals:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaxTotalResult'
        payments:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/PaymentResult'
        additionalInformation:
          type: array
          maxItems: 15
          items:
            $ref: '#/components/schemas/AdditionalInformationInput'
        subtotalBeforeTaxes:
          $ref: '#/components/schemas/MoneyDecimal'
        totalDiscount:
          $ref: '#/components/schemas/MoneyDecimal'
        grandTotal:
          $ref: '#/components/schemas/MoneyDecimal'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BuyerResult:
      allOf:
        - $ref: '#/components/schemas/BuyerInput'

    InvoiceLineResult:
      type: object
      additionalProperties: false
      required:
        - position
        - productCode
        - description
        - quantity
        - unitPrice
        - discount
        - grossAmount
        - netAmount
        - tax
        - lineTotal
      properties:
        position:
          type: integer
          minimum: 1
          maximum: 500
        productCode:
          type: string
          maxLength: 25
        description:
          type: string
          maxLength: 300
        quantity:
          $ref: '#/components/schemas/PositiveSixScaleDecimal'
        unitPrice:
          $ref: '#/components/schemas/NonNegativeSixScaleDecimal'
        discount:
          $ref: '#/components/schemas/MoneyDecimal'
        grossAmount:
          $ref: '#/components/schemas/MoneyDecimal'
        netAmount:
          $ref: '#/components/schemas/MoneyDecimal'
        tax:
          $ref: '#/components/schemas/LineTaxResult'
        lineTotal:
          $ref: '#/components/schemas/MoneyDecimal'

    LineTaxResult:
      type: object
      additionalProperties: false
      required:
        - taxRuleId
        - family
        - treatment
        - officialTaxCode
        - officialPercentageCode
        - rate
        - base
        - amount
        - catalogVersion
      properties:
        taxRuleId:
          type: string
          format: uuid
        family:
          type: string
          const: IVA
        treatment:
          $ref: '#/components/schemas/TaxTreatment'
        officialTaxCode:
          type: string
          maxLength: 8
        officialPercentageCode:
          type: string
          maxLength: 8
        rate:
          $ref: '#/components/schemas/PercentageDecimal'
        base:
          $ref: '#/components/schemas/MoneyDecimal'
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    TaxTotalResult:
      type: object
      additionalProperties: false
      required:
        - family
        - treatment
        - officialTaxCode
        - officialPercentageCode
        - rate
        - base
        - amount
        - catalogVersion
      properties:
        family:
          type: string
          const: IVA
        treatment:
          $ref: '#/components/schemas/TaxTreatment'
        officialTaxCode:
          type: string
          maxLength: 8
        officialPercentageCode:
          type: string
          maxLength: 8
        rate:
          $ref: '#/components/schemas/PercentageDecimal'
        base:
          $ref: '#/components/schemas/MoneyDecimal'
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    PaymentResult:
      type: object
      additionalProperties: false
      required: [paymentMethodId, officialCode, name, amount, catalogVersion]
      properties:
        paymentMethodId:
          type: string
          format: uuid
        officialCode:
          type: string
          maxLength: 8
        name:
          type: string
          maxLength: 100
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    TaxTreatment:
      type: string
      enum: [PERCENTAGE_RATE, ZERO_RATE, NOT_SUBJECT, EXEMPT]

    PositiveSixScaleDecimal:
      type: string
      minLength: 1
      maxLength: 25
      pattern: '^(?=.*[1-9])(?=(?:\D*\d){1,18}\D*$)(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      examples: ['2', '2.500000']

    NonNegativeSixScaleDecimal:
      type: string
      minLength: 1
      maxLength: 25
      pattern: '^(?=(?:\D*\d){1,18}\D*$)(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      examples: ['0', '10.000000']

    MoneyDecimal:
      type: string
      pattern: '^(?:0|[1-9][0-9]{0,11})\.[0-9]{2}$'
      examples: ['0.00', '17.25']

    PercentageDecimal:
      type: string
      pattern: '^(?:(?:0|[1-9][0-9]?)\.[0-9]{2}|100\.00)$'
      examples: ['0.00', '15.00']

    ErrorCode:
      type: string
      enum:
        - COMPANY_CONTEXT_REQUIRED
        - COMPANY_CONTEXT_INVALID
        - INVALID_REQUEST
        - PROHIBITED_CALCULATED_FIELD
        - IDEMPOTENCY_CONFLICT
        - REQUEST_PAYLOAD_TOO_LARGE
        - BUSINESS_VALIDATION_FAILED
        - PERSISTENCE_UNAVAILABLE
        - REQUEST_TIMEOUT
        - INTERNAL_ERROR

    ProblemDetails:
      type: object
      additionalProperties: false
      required: [type, title, status, code, detail, instance, correlationId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          $ref: '#/components/schemas/ErrorCode'
        detail:
          type: string
          description: Safe English detail without rejected values or implementation internals.
        instance:
          type: string
          format: uri
        correlationId:
          $ref: '#/components/schemas/CorrelationIdentifier'
        violations:
          type: array
          items:
            $ref: '#/components/schemas/Violation'

    Violation:
      type: object
      additionalProperties: false
      required: [code, field]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
        field:
          type: string
          description: Safe request field path; never contains the rejected value.

  responses:
    BadRequest:
      description: >-
        COMPANY_CONTEXT_REQUIRED, COMPANY_CONTEXT_INVALID, or INVALID_REQUEST. No draft, child,
        or idempotency binding is created.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    IdempotencyConflict:
      description: IDEMPOTENCY_CONFLICT; the scoped key is bound to different content.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PayloadTooLarge:
      description: REQUEST_PAYLOAD_TOO_LARGE; body exceeds 2,097,152 bytes.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationFailure:
      description: PROHIBITED_CALCULATED_FIELD or BUSINESS_VALIDATION_FAILED.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PersistenceUnavailable:
      description: PERSISTENCE_UNAVAILABLE; retry with the same Company, key, and content.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
        Retry-After:
          description: Optional safe retry delay when known.
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    RequestTimeout:
      description: REQUEST_TIMEOUT; retry with the same Company, key, and content.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalFailure:
      description: INTERNAL_ERROR; safe unexpected failure.
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
