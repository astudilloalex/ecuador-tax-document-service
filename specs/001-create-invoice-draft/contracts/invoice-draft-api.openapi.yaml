openapi: 3.1.0
info:
  title: Ecuador Tax Document Service - Invoice Draft API
  version: 1.0.0
  description: >-
    Target API for creating and immediately reviewing one internal invoice draft. This contract
    does not preserve a legacy route or trigger any SRI/fiscal side effect.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: Invoice Drafts

paths:
  /api/v1/companies/{companyId}/invoice-drafts:
    post:
      tags: [Invoice Drafts]
      operationId: createInvoiceDraft
      summary: Create and return a complete invoice draft
      description: >-
        Requires the Keycloak client role billing_operator. The company path value is untrusted
        until authoritative Company authorization succeeds. The request must contain commercial
        inputs only; calculated values, tax codes, and tax rates are rejected. The Company bounded
        context remains the current master-data authority; this operation persists only the
        external Company ownership identifier and immutable document fiscal evidence.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceDraftRequest'
      responses:
        '201':
          description: A new invoice draft and idempotency binding were committed.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
            Idempotency-Replayed:
              schema:
                type: boolean
                const: false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDraftResponse'
        '200':
          description: An equivalent retry returned the original committed draft without mutation.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
            Idempotency-Replayed:
              schema:
                type: boolean
                const: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDraftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/BusinessValidation'
        '500':
          $ref: '#/components/responses/InternalFailure'
        '503':
          $ref: '#/components/responses/DependencyUnavailable'
        '504':
          $ref: '#/components/responses/DependencyTimeout'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Keycloak access token with the configured issuer, invoice-service and company-capability
        audiences, authorized party, subject, and billing_operator service-client role.

  parameters:
    CompanyId:
      name: companyId
      in: path
      required: true
      description: Requested Company; authorization is resolved server-side.
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Caller-generated printable ASCII key, trimmed and scoped by effective tenant when
        applicable plus Company. It remains bound for the draft lifetime.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x20-\x7E]+$'
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      description: >-
        Optional caller correlation value. The service returns a UUID and generates a new one when
        this value is absent or invalid.
      schema:
        type: string
        maxLength: 64

  headers:
    CorrelationId:
      description: UUID used to correlate this attempt and its safe operational records.
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateInvoiceDraftRequest:
      type: object
      additionalProperties: false
      required:
        - issuerId
        - emissionPointId
        - emissionDate
        - buyer
        - lines
        - payments
      properties:
        issuerId:
          type: string
          format: uuid
          description: Must be the effective Company's single Issuer.
        emissionPointId:
          type: string
          format: uuid
          description: Must be active and belong to the selected Issuer.
        emissionDate:
          type: string
          format: date
          description: Must equal the Ecuadorian civil date at creation.
        buyer:
          $ref: '#/components/schemas/BuyerInput'
        lines:
          type: array
          minItems: 1
          maxItems: 500
          description: Order is business-significant and is preserved.
          items:
            $ref: '#/components/schemas/InvoiceLineInput'
        payments:
          type: array
          minItems: 1
          maxItems: 10
          description: >-
            Order is not business-significant. Payment method identity must be unique within the
            request.
          items:
            $ref: '#/components/schemas/PaymentInput'
        additionalInformation:
          type: array
          maxItems: 15
          default: []
          description: Order is not business-significant; trimmed names must be unique.
          items:
            $ref: '#/components/schemas/AdditionalInformationInput'

    BuyerInput:
      type: object
      additionalProperties: false
      required: [identificationType, identification, legalName]
      properties:
        identificationType:
          type: string
          enum: ['04', '05', '06', '07', '08']
          description: Exact SRI buyer-identification type effective on the emission date.
        identification:
          type: string
          minLength: 1
          maxLength: 20
          description: Validated by the selected effective SRI rule.
        legalName:
          type: string
          minLength: 1
          maxLength: 300
        address:
          type: string
          minLength: 1
          maxLength: 300
        email:
          type: string
          format: email
          maxLength: 254
        telephone:
          type: string
          minLength: 7
          maxLength: 20
          pattern: '^(?=(?:\D*\d){7,15}\D*$)[0-9+() -]+$'
          description: Must contain 7 through 15 digits after formatting is removed.

    InvoiceLineInput:
      type: object
      additionalProperties: false
      required: [productCode, description, quantity, unitPrice, discount, taxRuleId]
      properties:
        productCode:
          type: string
          minLength: 1
          maxLength: 25
          pattern: '^[A-Za-z0-9]+$'
        description:
          type: string
          minLength: 1
          maxLength: 300
        quantity:
          $ref: '#/components/schemas/QuantityDecimal'
        unitPrice:
          $ref: '#/components/schemas/NonNegativeSixScaleDecimal'
        discount:
          $ref: '#/components/schemas/MoneyDecimal'
        taxRuleId:
          type: string
          format: uuid
          description: >-
            Selects one active, emission-date-effective IVA rule. Tax code, rate, base, and amount
            are resolved and calculated by the service.

    PaymentInput:
      type: object
      additionalProperties: false
      required: [paymentMethodId, amount]
      properties:
        paymentMethodId:
          type: string
          format: uuid
        amount:
          $ref: '#/components/schemas/MoneyDecimal'

    AdditionalInformationInput:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        value:
          type: string
          minLength: 1
          maxLength: 300

    InvoiceDraftResponse:
      type: object
      additionalProperties: false
      required:
        - draftId
        - companyId
        - issuer
        - emissionPoint
        - emissionDate
        - status
        - currency
        - buyer
        - lines
        - taxTotals
        - payments
        - additionalInformation
        - subtotalBeforeTaxes
        - totalDiscount
        - grandTotal
        - createdAt
        - lastModifiedAt
      properties:
        draftId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
          description: Sole external Company ownership reference for this document.
        issuer:
          $ref: '#/components/schemas/IssuerSnapshot'
        emissionPoint:
          $ref: '#/components/schemas/EmissionPointSnapshot'
        emissionDate:
          type: string
          format: date
        status:
          type: string
          const: DRAFT
        currency:
          type: string
          const: USD
        buyer:
          $ref: '#/components/schemas/BuyerResult'
        lines:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/InvoiceLineResult'
        taxTotals:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaxTotalResult'
        payments:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/PaymentResult'
        additionalInformation:
          type: array
          maxItems: 15
          items:
            $ref: '#/components/schemas/AdditionalInformationInput'
        subtotalBeforeTaxes:
          $ref: '#/components/schemas/MoneyDecimal'
        totalDiscount:
          $ref: '#/components/schemas/MoneyDecimal'
        grandTotal:
          $ref: '#/components/schemas/MoneyDecimal'
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time

    IssuerSnapshot:
      type: object
      additionalProperties: false
      description: >-
        Immutable document-owned historical evidence captured at creation; not current Company
        master data and never refreshed during replay.
      required: [issuerId, ruc, legalName, headOfficeAddress, accountingRequired, contextVersion]
      properties:
        issuerId:
          type: string
          format: uuid
        ruc:
          type: string
          pattern: '^[0-9]{13}$'
        legalName:
          type: string
          maxLength: 300
        tradeName:
          type: string
          maxLength: 300
        headOfficeAddress:
          type: string
          maxLength: 300
        accountingRequired:
          type: boolean
        specialTaxpayerCode:
          type: string
          maxLength: 32
        withholdingAgentCode:
          type: string
          maxLength: 32
        regimeCode:
          type: string
          maxLength: 32
        contextVersion:
          type: string
          maxLength: 64

    EmissionPointSnapshot:
      type: object
      additionalProperties: false
      description: >-
        Immutable document-owned establishment and emission-point evidence captured at creation;
        not a local master-data representation.
      required: [emissionPointId, establishmentCode, emissionPointCode, establishmentAddress]
      properties:
        emissionPointId:
          type: string
          format: uuid
        establishmentCode:
          type: string
          pattern: '^[0-9]{3}$'
        emissionPointCode:
          type: string
          pattern: '^[0-9]{3}$'
        establishmentAddress:
          type: string
          minLength: 1
          maxLength: 300

    BuyerResult:
      allOf:
        - $ref: '#/components/schemas/BuyerInput'

    InvoiceLineResult:
      type: object
      additionalProperties: false
      required:
        - position
        - productCode
        - description
        - quantity
        - unitPrice
        - discount
        - grossAmount
        - netAmount
        - tax
        - lineTotal
      properties:
        position:
          type: integer
          minimum: 1
          maximum: 500
        productCode:
          type: string
          maxLength: 25
        description:
          type: string
          maxLength: 300
        quantity:
          $ref: '#/components/schemas/QuantityDecimal'
        unitPrice:
          $ref: '#/components/schemas/NonNegativeSixScaleDecimal'
        discount:
          $ref: '#/components/schemas/MoneyDecimal'
        grossAmount:
          $ref: '#/components/schemas/MoneyDecimal'
        netAmount:
          $ref: '#/components/schemas/MoneyDecimal'
        tax:
          $ref: '#/components/schemas/LineTaxResult'
        lineTotal:
          $ref: '#/components/schemas/MoneyDecimal'

    LineTaxResult:
      type: object
      additionalProperties: false
      required:
        - taxRuleId
        - family
        - treatment
        - officialTaxCode
        - officialPercentageCode
        - rate
        - base
        - amount
        - catalogVersion
      properties:
        taxRuleId:
          type: string
          format: uuid
        family:
          type: string
          const: IVA
        treatment:
          $ref: '#/components/schemas/TaxTreatment'
        officialTaxCode:
          type: string
          maxLength: 8
        officialPercentageCode:
          type: string
          maxLength: 8
        rate:
          $ref: '#/components/schemas/PercentageDecimal'
        base:
          $ref: '#/components/schemas/MoneyDecimal'
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    TaxTotalResult:
      type: object
      additionalProperties: false
      required:
        - family
        - treatment
        - officialTaxCode
        - officialPercentageCode
        - rate
        - base
        - amount
        - catalogVersion
      properties:
        family:
          type: string
          const: IVA
        treatment:
          $ref: '#/components/schemas/TaxTreatment'
        officialTaxCode:
          type: string
          maxLength: 8
        officialPercentageCode:
          type: string
          maxLength: 8
        rate:
          $ref: '#/components/schemas/PercentageDecimal'
        base:
          $ref: '#/components/schemas/MoneyDecimal'
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    PaymentResult:
      type: object
      additionalProperties: false
      required: [paymentMethodId, officialCode, name, amount, catalogVersion]
      properties:
        paymentMethodId:
          type: string
          format: uuid
        officialCode:
          type: string
          maxLength: 8
        name:
          type: string
          maxLength: 100
        amount:
          $ref: '#/components/schemas/MoneyDecimal'
        catalogVersion:
          type: string
          maxLength: 64

    TaxTreatment:
      type: string
      enum: [PERCENTAGE_RATE, ZERO_RATE, NOT_SUBJECT, EXEMPT]

    QuantityDecimal:
      type: string
      minLength: 1
      maxLength: 25
      pattern: '^(?=.*[1-9])(?=(?:\D*\d){1,18}\D*$)(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      description: Positive exact decimal with <=18 total digits and <=6 fractional digits.
      examples: ['2', '2.500000']

    NonNegativeSixScaleDecimal:
      type: string
      minLength: 1
      maxLength: 25
      pattern: '^(?=(?:\D*\d){1,18}\D*$)(?:0|[1-9][0-9]*)(?:\.[0-9]{1,6})?$'
      description: Non-negative exact decimal with <=18 total digits and <=6 fractional digits.
      examples: ['0', '10.000000']

    MoneyDecimal:
      type: string
      pattern: '^(?:0|[1-9][0-9]{0,11})\.[0-9]{2}$'
      description: Non-negative exact USD decimal with exactly two fractional digits and <=14 total digits.
      examples: ['0.00', '17.25']

    PercentageDecimal:
      type: string
      pattern: '^(?:(?:0|[1-9][0-9]?)\.[0-9]{2}|100\.00)$'
      description: Percentage points from 0.00 through 100.00.
      examples: ['0.00', '15.00']

    ProblemDetails:
      type: object
      additionalProperties: true
      required: [type, title, status, code, detail, instance, correlationId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: Stable English machine-readable code.
        detail:
          type: string
          description: Safe English detail with no rejected values or internals.
        instance:
          type: string
          format: uri
        correlationId:
          type: string
          format: uuid
        violations:
          type: array
          items:
            $ref: '#/components/schemas/Violation'

    Violation:
      type: object
      additionalProperties: false
      required: [code, field]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
        field:
          type: string
          description: Safe request field path; never includes the rejected value.

  responses:
    BadRequest:
      description: Malformed JSON, missing header, unknown/calculated field, or invalid representation.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Unauthorized:
      description: Missing or invalid bearer token.
      headers:
        WWW-Authenticate:
          schema:
            type: string
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Authenticated principal lacks billing_operator.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Requested Company, Issuer, or emission point is absent or inaccessible.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    IdempotencyConflict:
      description: The scoped key is bound to different normalized business content.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    BusinessValidation:
      description: Structurally valid request violates an application/domain/catalog rule.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalFailure:
      description: Safe generic failure; no partial draft or binding remains.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    DependencyUnavailable:
      description: A required authoritative dependency is unavailable.
      headers:
        Retry-After:
          description: Included only when a safe retry interval is known.
          schema:
            type: string
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    DependencyTimeout:
      description: A required authoritative dependency exceeded its configured timeout.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
