name: Reconcile invoice draft contract

on:
  push:
    branches:
      - agent/reconcile-invoice-draft-contract
    paths:
      - .github/reconcile-trigger

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reconciliation branch
        uses: actions/checkout@v4
        with:
          ref: agent/reconcile-invoice-draft-contract
          fetch-depth: 0

      - name: Preserve bounded reconciliation script
        run: cp .github/scripts/reconcile_invoice_draft_contract.py /tmp/reconcile_invoice_draft_contract.py

      - name: Checkout working branch
        run: |
          git fetch origin 6-ft-1
          git checkout -B 6-ft-1 origin/6-ft-1

      - name: Apply documentary reconciliation
        run: python3 /tmp/reconcile_invoice_draft_contract.py

      - name: Validate diff and OpenAPI YAML
        run: |
          git diff --check
          ruby -e "require 'yaml'; YAML.load_file('specs/001-create-invoice-draft/contracts/invoice-draft-api.openapi.yaml'); puts 'OpenAPI YAML parsed.'"
          test -z "$(git diff --name-only -- src/main src/test src/main/resources/db/migration)"

      - name: Commit and push working branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs/001-create-invoice-draft
          git commit -m "docs: reconcile invoice draft contract validation"
          git push origin HEAD:6-ft-1
